# /etc/nginx/sites-available/ecommerce

upstream api_cluster {
    least_conn;                          # Route to least busy worker
    server 127.0.0.1:5000;
    keepalive 32;                        # Keep connections alive
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── Rate limiting at Nginx level ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req      zone=api burst=20 nodelay;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_types        application/json text/plain application/javascript;
    gzip_comp_level   6;
    gzip_min_length   1024;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   10s;
    send_timeout            30s;
    keepalive_timeout       65s;

    # ── Proxy to Node.js ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_cluster;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";   # For WebSocket
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer settings
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }

    # ── WebSocket support (Socket.IO) ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;   # Long-lived WebSocket connections
        proxy_send_timeout 3600s;
    }

    # ── Health check (no rate limiting) ──────────────────────────────────────
    location /health {
        proxy_pass http://api_cluster;
        access_log off;
    }

    # ── Block common attack vectors ───────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* /\.git                    { return 444; }
    location ~* /\.env                    { return 444; }
    location ~* wp-admin                  { return 444; }
}